<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>organism lab</title>
    <style>
      * { margin: 0; box-sizing: border-box; }
      html, body { height: 100%; }
      body { background: #0a0a0a; color: #ececec; font: 12px/1.4 'JetBrains Mono', monospace; min-height: 230vh; }
      .organism-background { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
      .box {
        position: absolute; z-index: 1; border: 1px solid rgba(236,236,236,0.3);
        background: rgba(20,20,20,0.9); display: grid; place-items: center;
      }
      #box1 { left: 35%; top: 40vh; width: 30%; height: 32vh; }
      #box2 { left: 12%; top: 150vh; width: 30%; height: 40vh; }
      #box3 { left: 6%; top: 14vh; width: 34%; height: 13vh; }
      /* mirror .t-display from the main app (global.css): Archivo Black,
         -0.02px tracking (NOT em), line-height 0.88, uppercase */
      .word { position: absolute; left: 8%; top: 76vh; z-index: 1; font-weight: 400; font-size: 11vh; letter-spacing: -0.02px; line-height: 0.88; color: #ececec; font-family: 'Archivo Black', Impact, sans-serif; text-transform: uppercase; user-select: none; }
      .word span { display: inline-block; }
      #circle1 { left: 68%; top: 20vh; width: 21vh; height: 21vh; border-radius: 50%; }
      #hud { position: fixed; background: #0a0a0a; padding: 4px 8px; left: 12px; top: 10px; z-index: 2; color: rgba(236,236,236,0.6); }
      a { color: inherit; }
    </style>
  </head>
  <body>
    <div id="hud">
      organism lab — views:
      <a href="?organism=final">final</a> · <a href="?organism=outline">outline</a> ·
      <a href="?organism=mask">mask</a> · <a href="?organism=sdf">sdf</a> ·
      <a href="?organism=skeleton">skeleton</a> · <a href="?organism=limbs">limbs</a> · <a href="?organism=field">field</a> · <a href="?organism=brain">brain</a>
    </div>
    <div class="box" id="box1" data-organism-obstacle data-organism-padding="6">obstacle</div>
    <div class="box" id="box2" data-organism-obstacle data-organism-padding="6">obstacle 2 (scroll down)</div>
    <div class="box" id="box3" data-organism-obstacle data-organism-padding="6">wide obstacle</div>
    <div class="box" id="circle1" data-organism-obstacle data-organism-padding="6" data-organism-shape="circle">o</div>
    <div class="word" aria-hidden="true"><span data-organism-obstacle data-organism-shape="text" data-organism-padding="4">204</span>&nbsp;<span data-organism-obstacle data-organism-shape="text" data-organism-padding="4">LAB</span></div>
    <div class="organism-background" id="mount" aria-hidden="true"></div>
    <script type="module" src="/src/organism-lab.ts"></script>
  </body>
</html>
