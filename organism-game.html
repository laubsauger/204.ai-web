<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>slime run · 204 lab</title>
    <style>
      * { margin: 0; box-sizing: border-box; }
      html, body { height: 100%; }
      body { background: #0a0a0a; color: #ececec; font: 12px/1.4 'JetBrains Mono', monospace; height: 100vh; overflow: hidden; }
      .organism-background { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
      .wall {
        position: absolute; z-index: 1; border: 1px solid rgba(236,236,236,0.28);
        background: rgba(20,20,20,0.92);
      }
      /* terrain: two rooms + narrow squeeze corridor + high ledge */
      #w-top    { left: 22%; top: 0;     width: 3.5%; height: 34vh; }
      #w-bottom { left: 22%; top: 46vh;  width: 3.5%; height: 54vh; }  /* gap 34..46vh = squeeze: passable small, closed fat */
      #w-mid    { left: 46%; top: 26vh;  width: 26%;  height: 9vh; }
      #w-block  { left: 60%; top: 62vh;  width: 15%;  height: 16vh; }
      #w-ledge  { left: 84%; top: 40vh;  width: 16%;  height: 7vh; }
      .pellet {
        position: absolute; z-index: 1; width: 14px; height: 14px; border-radius: 50%;
        background: radial-gradient(circle at 38% 35%, #ffb08e 0%, #c9442b 55%, #7e2413 100%);
        box-shadow: 0 0 12px 2px rgba(201, 68, 43, 0.55);
        transform: translate(-50%, -50%);
        transition: opacity 0.25s, scale 0.25s;
      }
      .pellet.eaten { opacity: 0; scale: 2.2; }
      #hud {
        position: fixed; left: 12px; top: 10px; z-index: 2; background: #0a0a0a;
        padding: 4px 8px; color: rgba(236,236,236,0.72); user-select: none;
      }
      #hud b { color: #c9442b; }
      #title {
        position: fixed; right: 16px; bottom: 10px; z-index: 1; user-select: none;
        font-family: 'Archivo Black', Impact, sans-serif; font-size: 5vh;
        letter-spacing: -0.02px; line-height: 0.88; text-transform: uppercase;
        color: rgba(236,236,236,0.92);
      }
      #msg { position: fixed; left: 12px; top: 34px; z-index: 2; color: rgba(236,236,236,0.45); }
    </style>
  </head>
  <body>
    <div id="hud">slime run — food <b id="score">0</b> · size <b id="size">1.00</b>×</div>
    <div id="msg">steer with the cursor. eat. grow. big slime jumps far — but stops fitting through the squeeze.</div>
    <div class="wall" id="w-top" data-organism-obstacle data-organism-padding="6"></div>
    <div class="wall" id="w-bottom" data-organism-obstacle data-organism-padding="6"></div>
    <div class="wall" id="w-mid" data-organism-obstacle data-organism-padding="6"></div>
    <div class="wall" id="w-block" data-organism-obstacle data-organism-padding="6"></div>
    <div class="wall" id="w-ledge" data-organism-obstacle data-organism-padding="6"></div>
    <div id="title" aria-hidden="true">slime<br />run</div>
    <div class="organism-background" id="mount" aria-hidden="true"></div>
    <script type="module" src="/src/organism-game.ts"></script>
  </body>
</html>
